version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx_lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - server

  server:
    build:
      context: ./server
    environment:
      - NODE_ENV=production
    expose:
      - "5000"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api"]
      interval: 10s
      timeout: 5s
      retries: 3

  client:
    build: ./client
    ports:
      - "5173:80"
    depends_on:
      - nginx

  vendor:
    build: ./vendor
    ports:
      - "5174:80"
    depends_on:
      - nginx

  admin:
    build: ./admin
    ports:
      - "5175:80"
    depends_on:
      - nginx